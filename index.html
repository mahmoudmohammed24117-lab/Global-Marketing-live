<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة البورصة العالمية اللحظية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <header>
            <h1 class="logo">GLOBAL MARKET LIVE</h1>
            <div class="live-tag">
                <div class="dot"></div>
                <span>اتصال مباشر بالبورصة: </span>
                <span id="timer" class="neutral-text">--:--:--</span>
            </div>
        </header>

        <table class="market-table">
            <thead>
                <tr>
                    <th class="text-right">الأصل المالي</th>
                    <th>الرمز</th>
                    <th>السعر المحرك (EGP)</th>
                    <th>السعر العالمي (USD)</th>
                </tr>
            </thead>
            <tbody id="market-data">
                </tbody>
        </table>
    </div>

    <script src="main.js"></script>
</body>
</html>
